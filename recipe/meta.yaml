{% set name = "py-key-value-aio" %}
{% set version = "0.4.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/py_key_value_aio/py_key_value_aio-{{ version }}.tar.gz
    sha256: e3012e6243ed7cc09bb05457bd4d03b1ba5c2b1ca8700096b3927db79ffbbe55

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps

requirements:
  host:
    - python
    - uv-build >=0.8.2,<0.9.0
    - pip
  run:
    - python
    - beartype >=0.20.2
    - typing_extensions >=4.15.0
  run_constrained:
    # [project.optional-dependencies.standard]
    # py-key-value-aio[memory]
    - cachetools >=5.0.0
    # py-key-value-aio[disk]
    - diskcache >=5.0.0
    - pathvalidate >=3.3.1
    # py-key-value-aio[redis]
    - redis-py >=4.3.0
    # py-key-value-aio[mongodb]
    - pymongo >=4.0.0
    # py-key-value-aio[valkey]
    - valkey-glide >=2.1.0
    # py-key-value-aio[vault]
    - hvac >=2.3.0
    - types-hvac >=2.3.0
    # py-key-value-aio[memcached]
    - aiomcache >=0.8.0
    # py-key-value-aio[elasticsearch]
    - elasticsearch >=8.0.0
    - aiohttp>=3.12
    # py-key-value-aio[dynamodb]
    - aioboto3 >=13.3.0
    - types-aiobotocore-dynamodb >=2.16.0
    # py-key-value-aio[s3]
    - types-aiobotocore-s3 >=2.16.0
    # py-key-value-aio[keyring]
    - keyring >=25.6.0
    # py-key-value-aio[keyring-linux]
    - dbus-python >=1.4.0
    # py-key-value-aio[pydantic]
    - pydantic >=2.11.9
    # py-key-value-aio[rocksdb]
    - rocksdict >=0.3.2  # [py<312]
    - rocksdict >=0.3.24  # [py>=312]
    # py-key-value-aio[wrappers-encryption]
    - cryptography >=45.0.0
    # py-key-value-aio[duckdb]
    - duckdb >=1.1.1
    - pytz >=2025.2
    # py-key-value-aio[dynamodb]
    - asyncpg >=0.30.0

test:
  imports:
    - key_value
    - key_value.shared
    - key_value.aio
    - key_value.aio.stores.base
  requires:
    - pip
  commands:
    - pip check

about:
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  summary: Shared Key-Value, A pluggable interface for KV Stores
  description: |
    This library provides a pluggable interface for key-value
    stores with support for multiple backends, TTL handling,
    type safety, and extensible wrappers.
  home: https://github.com/strawgate/py-key-value
  dev_url: https://github.com/strawgate/py-key-value
  doc_url: https://strawgate.com/py-key-value/

extra:
  recipe-maintainers:
    - viridianmelody
