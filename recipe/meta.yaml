{% set name = "py-key-value" %}
{% set version = "0.3.0" %}

package:
  name: py-key-value
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/py_key_value_shared/py_key_value_shared-{{ version }}.tar.gz
    sha256: 8fdd786cf96c3e900102945f92aa1473138ebe960ef49da1c833790160c28a4b
    folder: py-key-value-shared
  - url: https://pypi.org/packages/source/{{ name[0] }}/py_key_value_aio/py_key_value_aio-{{ version }}.tar.gz
    sha256: 858e852fcf6d696d231266da66042d3355a7f9871650415feef9fca7a6cd4155
    folder: py-key-value-aio

build:
  number: 0

outputs:
  - name: py-key-value-shared
    script: build_shared.sh  # [not win]
    script: build_shared.bat  # [win]
    requirements:
      host:
        - python
        - uv-build >=0.8.2,<0.9.0
        - pip
      run:
        - python
        # [project.dependencies]
        # https://github.com/strawgate/py-key-value/blob/0.3.0/key-value/key-value-shared/pyproject.toml#L17
        - typing_extensions >=4.15.0
        - beartype >=0.20.0
    test:
      imports:
        - key_value
        - key_value.shared
      requires:
        - pip
      commands:
        - pip check

  - name: py-key-value-aio
    script: build_aio.sh  # [not win]
    script: build_aio.bat  # [win]
    requirements:
      host:
        - python
        - uv-build >=0.8.2,<0.9.0
        - pip
      run:
        - python
        # [project.dependencies]
        # https://github.com/strawgate/py-key-value/blob/0.3.0/key-value/key-value-aio/pyproject.toml#L17-L19
        - beartype >=0.22.2
        - {{ pin_subpackage("py-key-value-shared", exact=True) }}
      run_constrained:
        # [project.optional-dependencies.standard]
        # https://github.com/strawgate/py-key-value/blob/0.3.0/key-value/key-value-aio/pyproject.toml#L34-L53
        # py-key-value-aio[memory]
        - cachetools >=6.0.0
        # py-key-value-aio[disk]
        - diskcache >=5.0.0
        - pathvalidate >=3.3.1
        # py-key-value-aio[redis]
        - redis-py >=4.3.0
        # py-key-value-aio[mongodb]
        - pymongo >=4.0.0
        # py-key-value-aio[valkey]
        - valkey-glide >=2.1.0
        # py-key-value-aio[vault]
        - hvac >=2.3.0
        - types-hvac >=2.3.0
        # py-key-value-aio[memcached]
        - aiomcache >=0.8.0
        # py-key-value-aio[elasticsearch]
        - elasticsearch >=8.0.0
        - aiohttp>=3.12
        # py-key-value-aio[dynamodb]
        - aioboto3 >=13.3.0
        - types-aiobotocore-dynamodb >=2.16.0
        # py-key-value-aio[keyring]
        - keyring >=25.6.0
        # py-key-value-aio[keyring-linux]
        - dbus-python >=1.4.0
        # py-key-value-aio[registry]
        # Uses built-in winreg module on Windows
        # py-key-value-aio[pydantic]
        - pydantic >=2.11.9
        # py-key-value-aio[rocksdb]
        - rocksdict >=0.3.2  # [py<312]
        - rocksdict >=0.3.24  # [py>=312]
        # py-key-value-aio[wrappers-encryption]
        - cryptography >=45.0.0
        # py-key-value-aio[duckdb]
        - duckdb >=1.1.1
        - pytz >=2025.2

    test:
      imports:
        - key_value
        - key_value.shared
        - key_value.aio
        - key_value.aio.stores.base
      requires:
        - pip
      commands:
        - pip check

about:
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  summary: Shared Key-Value, A pluggable interface for KV Stores
  home: https://github.com/strawgate/py-key-value
  dev_url: https://github.com/strawgate/py-key-value
  doc_url: https://github.com/strawgate/py-key-value/blob/main/README.md